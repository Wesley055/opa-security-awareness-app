services:
  postgres:
    image: postgres:16-alpine
    container_name: opa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: opa
      POSTGRES_PASSWORD: opa_dev_password
      POSTGRES_DB: opa
    ports:
      - "5432:5432"
    volumes:
      - opa_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opa -d opa"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opa-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - opa_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  opa_postgres_data:
  opa_redis_data:
