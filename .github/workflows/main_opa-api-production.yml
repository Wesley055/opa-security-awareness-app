# Build and deploy the OPA NestJS API (apps/api) to Azure App Service
name: Build and deploy Node.js app to Azure Web App - opa-api-production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace apps/api

      - name: Build API
        run: npm run build --workspace apps/api

      - name: Assemble standalone deploy folder
        run: |
          mkdir deploy
          cp -r apps/api/dist deploy/dist
          cp -r apps/api/prisma deploy/prisma
          cp apps/api/package.json deploy/package.json
          cd deploy
          npm install --include=dev --no-package-lock
          npx prisma generate
          npm prune --omit=dev

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7ED48C41FB6C4B5CBD86ACC11A40A853 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5442CDA40E6841199C2D4BCC060D3372 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_24434C11F98B468A82D40CA557B76FCF }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: opa-api-production
          slot-name: Production
          package: .